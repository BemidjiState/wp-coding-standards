# Calculates the next semantic version from conventional commit messages,
# updates package.json, commits the change, and pushes a git tag.
# Runs only on pushes to main (i.e. after a PR from release is merged).
name: "Release: Generate Semantic Version"

on:
  push:
    branches:
      - main

concurrency:
  group: "${{ github.ref }}-${{ github.workflow }}"
  cancel-in-progress: true

jobs:
  tag-release:
    # Skip when the triggering commit is itself a release bot version bump —
    # that push would otherwise cause this workflow to loop indefinitely.
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    timeout-minutes: 15
    permissions:
      contents: write
      actions: read

    runs-on: ubuntu-latest
    steps:

      # An app token is needed for pushing version commits to a protected branch.
      - name: Generate GitHub app token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ORG__BSU_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.ORG__BSU_RELEASE_BOT_PRIV_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          # Using the token here ensures all other git commands use it.
          token: ${{ steps.generate-token.outputs.token }}

      - name: Calculate next version
        id: version
        run: |
          # Find the latest standard semver tag reachable from HEAD.
          # Major version is limited to 1–3 digits to exclude old date-format
          # tags (e.g. 2025.11.03) that sort above normal semver tags under
          # --sort=-version:refname. Accepts a leading v-prefix; strips it.
          # Falls back to 0.0.0 when no valid tag exists.
          latest_tag=$(
            git tag --sort=-version:refname --merged HEAD \
              | grep -E '^v?[0-9]{1,3}\.[0-9]+\.[0-9]+$' \
              | head -n 1
          )
          latest_tag=${latest_tag:-0.0.0}
          latest_tag="${latest_tag#v}"

          echo "Latest tag: $latest_tag"

          IFS='.' read -r major minor patch <<< "$latest_tag"

          # Inspect conventional commit messages since the last tag to
          # determine the bump type. Defaults to patch.
          if [ "$latest_tag" != "0.0.0" ]; then
            commit_range="${latest_tag}..HEAD"
          else
            commit_range="HEAD"
          fi

          bump="patch"
          if git log "$commit_range" --format="%B" 2>/dev/null \
            | grep -qiE '^BREAKING[[:space:]]+CHANGE|^feat(\(.+\))?[!:]'; then
            if git log "$commit_range" --format="%B" 2>/dev/null \
              | grep -qiE '^BREAKING[[:space:]]+CHANGE|!:'; then
              bump="major"
            else
              bump="minor"
            fi
          fi

          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          version="${major}.${minor}.${patch}"
          echo "Bump type: $bump -> $version"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Update package.json, commit, and tag
        run: |
          version="${{ steps.version.outputs.version }}"

          python3 -c "
          import json, sys
          with open('package.json') as f:
              d = json.load(f)
          d['version'] = sys.argv[1]
          with open('package.json', 'w') as f:
              json.dump(d, f, indent='\t')
              f.write('\n')
          " "$version"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add package.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): $version"
            git push
          fi

          git tag "$version"
          git push origin "$version"
